<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Faculty Dashboard</title>

<style>
body{font-family:Arial;background:#f4f6f9;margin:0;}

.header{

}

.container{display:flex;}

.menu{
