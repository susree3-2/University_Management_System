<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>University Management System | Login</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-image: url('/background_image.jpg');
            background-repeat: no-repeat;
            background-position: center;
            background-attachment: fixed;
            background-size: cover;
        }

        .container {
            background: white;
            padding: 50px 40px;
            width: 360px;
            text-align: center;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
        }

        h1 {
            font-size: 22px;
            color: #1a73e8; /* University/Google Blue */
            margin-bottom: 8px;
        }

        .subtitle {
            color: #5f6368;
            font-size: 14px;
            margin-bottom: 30px;
        }

        /* The Google Login Button */
        .google-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 12px;
            background-color: white;
            color: #3c4043;
            border: 1px solid #dadce0;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s, box-shadow 0.2s;
        }

        .google-btn:hover {
            background-color: #f8f9fa;
            border-color: #d2d4d7;
            box-shadow: 0 1px 3px rgba(60,64,67, 0.3);
        }

        /* Google Logo Styling */
        .google-icon {
            width: 18px;
            height: 18px;
            margin-right: 12px; /* Space between logo and text */
        }

        .footer {
            margin-top: 30px;
            font-size: 11px;
            color: #9aa0a6;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>University Portal</h1>
    <p class="subtitle">Secure Sign-in for Admin Staff</p>

    <div style="display:flex; flex-direction:column; gap:10px;">

    
        <button class="google-btn" onclick="loginWithGoogle()">
            Sign in as Admin (Google)
        </button>
    

    </div>

    <div class="footer">
        Institutional Federated Identity
    </div>
</div>

<script>
function loginWithGoogle() {
    window.location.href = "/accounts/google/login/?process=login";
}
</script>

</body>
</html>
